{% extends 'base.html' %}

{% block content %}

<script>
    function validate_form() {
        let forename = document.forms['registerform']['forename'].value;
        if (forename == '') {
            alert('First name must be filled in!');
            return false;
        }

        let surname = document.forms['registerform']['surname'].value;
        if (surname == '') {
            alert('Surname must be filled in!');
            return false;
        }
        
        let valid = require('validator');
        let email = document.forms['registerform']['email'].value;
        if (!valid.isEmail(email)) {
            alert('Not a valid email!')
            return false;
        }

        let password = document.forms['registerform']['password'].value;
        if (!valid.isStrongPassword(password)) {
            alert('Password is too weak!')
            return false;
        }
    }

</script>
<!--validation referenced from w3schools, email validation referenced from geeksforgeeks-->

<form name="registerform" method="post" onsubmit="return validate_form()">
    <input type="text" name="forename" placeholder="Forename" />
    <input type="text" name="surname" placeholder="Surname" />
   
    <br />
    <br />
    
    <input type="email" name="email" placeholder="Email" required/>
    <input type="password" name="password" placeholder="Password" required/>
    
    <br />
   
    <label for="account_type">Choose account type:<br /></label>
    <select name="account_type" id="account_type">
        <option value="0">User</option>
        <option value="1">Producer</option>
    </select>
    <!--selection referenced from w3schools-->
    <br />
    <input type="submit" value="Register"/>
</form>


{% endblock %}
